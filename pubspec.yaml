name: cricketbuzz
description: "CricketBuzz - Live Cricket Scores & Stats"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # Auth
  google_sign_in: ^6.2.2

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Dependency Injection
  get_it: ^8.0.3

  # Storage
  shared_preferences: ^2.5.3

  # Network & Data
  http: ^1.4.0
  connectivity_plus: ^6.1.4

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  flutter_svg: ^2.1.0

  # Ads (add later when ready)
  # google_mobile_ads: ^6.0.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  timeago: ^3.7.0

  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

